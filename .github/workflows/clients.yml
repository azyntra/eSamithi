name: Clients

on:
  push:
    branches: [main]
    paths: ['src/**', 'mobile/**', 'package.json', 'package-lock.json', '.github/workflows/clients.yml']
  pull_request:
    paths: ['src/**', 'mobile/**', 'package.json', 'package-lock.json', '.github/workflows/clients.yml']

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (electron-vite)
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        working-directory: mobile
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
