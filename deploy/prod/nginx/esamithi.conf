# PROD default vhost (by IP) — mirrors the legacy host nginx it replaces:
# /api/ proxied to the Node API, /updates/ serves the desktop electron-updater
# feed. Existing desktop/mobile clients keep hitting http://<ip>/api/v1
# unchanged (DEFAULT_TENANT covers header-less legacy clients).
#
# proxy_pass uses variables + the Docker DNS resolver so container
# recreations never leave nginx with stale upstream IPs.
server {
    listen 80 default_server;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:3000;

    # Puruka photo uploads ride /api/v1/uploads through this same proxy
    client_max_body_size 50m;

    # Let's Encrypt HTTP-01 challenges (enable-api-tls.sh)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Desktop auto-update feed (electron-updater; /opt/esamithi-updates)
    location /updates/ {
        alias /srv/updates/;
        autoindex off;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
    }

    location = / {
        return 200 'eSamithi\n';
        add_header Content-Type text/plain;
    }
}
