# Testbed vhost — mirrors the host nginx it replaces: /api/ proxied to the
# Node API, /updates/ serves the desktop electron-updater feed (if present).
server {
    listen 80 default_server;
    server_name _;

    # Puruka photo uploads ride /api/v1/uploads through this same proxy
    client_max_body_size 20m;

    # Let's Encrypt HTTP-01 challenges (enable-tls.sh)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Samithi join-code resolution — served by platform-api (absorbed directory)
    location /directory/ {
        proxy_pass http://platform:4000/;
        proxy_set_header Host $host;
    }

    # Platform operator API + console (admin.esamithi.com once DNS exists)
    location /pa/ {
        proxy_pass http://platform:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        alias /srv/admin/;
        index index.html;
    }

    location /updates/ {
        alias /srv/updates/;
        autoindex off;
    }

    location = / {
        return 200 'eSamithi testbed\n';
        add_header Content-Type text/plain;
    }
}
