# Testbed vhost — mirrors the host nginx it replaces: /api/ proxied to the
# Node API, /updates/ serves the desktop electron-updater feed (if present).
server {
    listen 80 default_server;
    server_name _;

    # Puruka photo uploads ride /api/v1/uploads through this same proxy
    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Samithi join-code resolution (directory.esamithi.lk once the domain exists)
    location /directory/ {
        proxy_pass http://directory:8080/;
        proxy_set_header Host $host;
    }

    location /updates/ {
        alias /srv/updates/;
        autoindex off;
    }

    location = / {
        return 200 'eSamithi testbed\n';
        add_header Content-Type text/plain;
    }
}
