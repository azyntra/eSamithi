<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eSamithi Platform</title>
<style>
  :root { --bg:#0f1420; --card:#171e2e; --line:#2a3450; --text:#e7ecf5; --muted:#8b96ad;
          --pri:#3b82f6; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,'Segoe UI',Roboto,sans-serif; }
  .wrap { max-width:960px; margin:0 auto; padding:24px 16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:16px; }
  h1 { font-size:20px; margin-bottom:4px; } h2 { font-size:15px; margin-bottom:12px; }
  .muted { color:var(--muted); font-size:13px; }
  input { width:100%; padding:10px 12px; margin:6px 0 12px; background:#0d1220; color:var(--text);
          border:1px solid var(--line); border-radius:8px; font-size:14px; }
  button { padding:9px 16px; border:0; border-radius:8px; background:var(--pri); color:#fff;
           font-weight:600; cursor:pointer; font-size:13px; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--muted); }
  button.danger { background:var(--bad); } button.ok { background:var(--ok); color:#04210f; }
  button:disabled { opacity:.5; cursor:default; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.4px; }
  .pill { display:inline-block; padding:2px 10px; border-radius:100px; font-size:12px; font-weight:700; }
  .pill.active { background:rgba(34,197,94,.15); color:var(--ok); }
  .pill.suspended { background:rgba(239,68,68,.15); color:var(--bad); }
  .err { color:var(--bad); font-size:13px; margin-bottom:10px; min-height:18px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .right { margin-left:auto; }
  code { background:#0d1220; padding:1px 6px; border-radius:6px; font-size:12px; }
  #login { max-width:380px; margin:10vh auto 0; }
  .logo { width:44px; height:44px; border-radius:10px; background:var(--pri); color:#fff; display:flex;
          align-items:center; justify-content:center; font-weight:800; font-size:18px; margin-bottom:12px; }
  pre { white-space:pre-wrap; word-break:break-all; font-size:11px; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">

  <div id="login" class="card">
    <div class="logo">eS</div>
    <h1>eSamithi Platform</h1>
    <p class="muted" style="margin-bottom:14px">Operator console — restricted access</p>
    <div class="err" id="loginErr"></div>
    <div id="step1">
      <label class="muted">Email</label>
      <input id="email" type="email" autocomplete="username">
      <label class="muted">Password</label>
      <input id="password" type="password" autocomplete="current-password">
      <button onclick="doLogin()" id="loginBtn">Sign in</button>
    </div>
    <div id="step2" style="display:none">
      <label class="muted">Authenticator code</label>
      <input id="totp" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code or recovery code">
      <button onclick="doTotp()" id="totpBtn">Verify</button>
      <button class="ghost" onclick="backToLogin()">Back</button>
    </div>
  </div>

  <div id="panel" style="display:none">
    <div class="card">
      <div class="row">
        <div>
          <h1>Platform console</h1>
          <span class="muted" id="who"></span>
        </div>
        <button class="ghost right" onclick="doLogout()">Sign out</button>
      </div>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom:10px">
        <h2 style="margin:0">Samithis</h2>
        <button class="ghost right" onclick="loadSamithis()">Refresh</button>
      </div>
      <table id="samithis"><thead><tr>
        <th>Samithi</th><th>Join code</th><th>Database</th><th>Status</th><th></th>
      </tr></thead><tbody></tbody></table>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom:10px">
        <h2 style="margin:0">Audit log</h2>
        <button class="ghost right" onclick="loadAudit()">Refresh</button>
      </div>
      <table id="audit"><thead><tr>
        <th>When</th><th>Actor</th><th>Action</th><th>Samithi</th><th>Detail</th>
      </tr></thead><tbody></tbody></table>
    </div>
  </div>

</div>
<script>
const BASE = '/pa/v1';
let access = null, refresh = sessionStorage.getItem('pa.refresh'), mfaToken = null, me = null;

async function api(path, opts = {}) {
  const res = await fetch(BASE + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(access ? { Authorization: 'Bearer ' + access } : {}) }
  });
  if (res.status === 401 && refresh && !opts._retried) {
    const r = await fetch(BASE + '/auth/refresh', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refresh })
    });
    if (r.ok) {
      const d = await r.json();
      access = d.token; refresh = d.refresh_token; sessionStorage.setItem('pa.refresh', refresh);
      return api(path, { ...opts, _retried: true });
    }
    sessionStorage.removeItem('pa.refresh'); location.reload();
  }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || res.status);
  return data;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

async function doLogin() {
  loginErr.textContent = '';
  loginBtn.disabled = true;
  try {
    const r = await fetch(BASE + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email.value, password: password.value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Sign in failed');
    mfaToken = d.mfa_token;
    step1.style.display = 'none'; step2.style.display = 'block'; totp.focus();
  } catch (e) { loginErr.textContent = e.message; }
  loginBtn.disabled = false;
}

async function doTotp() {
  loginErr.textContent = '';
  totpBtn.disabled = true;
  try {
    const r = await fetch(BASE + '/auth/totp', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mfa_token: mfaToken, code: totp.value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Verification failed');
    access = d.token; refresh = d.refresh_token; me = d.admin;
    sessionStorage.setItem('pa.refresh', refresh);
    showPanel();
  } catch (e) { loginErr.textContent = e.message; }
  totpBtn.disabled = false;
}

function backToLogin() { step2.style.display = 'none'; step1.style.display = 'block'; }

async function doLogout() {
  await fetch(BASE + '/auth/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refresh }) }).catch(() => {});
  sessionStorage.removeItem('pa.refresh'); location.reload();
}

function showPanel() {
  login.style.display = 'none'; panel.style.display = 'block';
  who.textContent = me ? `${me.name} · ${me.email} · ${me.role}` : '';
  loadSamithis(); loadAudit();
}

async function loadSamithis() {
  const rows = await api('/samithis');
  document.querySelector('#samithis tbody').innerHTML = rows.map(s => `
    <tr>
      <td><b>${esc(s.name_en)}</b><br><span class="muted">${esc(s.slug)}</span></td>
      <td><code>${esc(s.join_code)}</code></td>
      <td class="muted">${esc(s.db_name)}</td>
      <td><span class="pill ${esc(s.status)}">${esc(s.status)}</span></td>
      <td class="row">
        ${s.status === 'active'
          ? `<button class="danger" onclick="act('${esc(s.slug)}','suspend')">Suspend</button>`
          : `<button class="ok" onclick="act('${esc(s.slug)}','reactivate')">Reactivate</button>`}
        <button class="ghost" onclick="act('${esc(s.slug)}','regenerate_code')">New code</button>
      </td>
    </tr>`).join('');
}

async function act(slug, action) {
  const warn = { suspend: `Suspend ${slug}? All its apps get a clear "suspended" error within 30 seconds.`,
                 regenerate_code: `Regenerate ${slug}'s join code? The old code stops working immediately.` };
  if (warn[action] && !confirm(warn[action])) return;
  try { await api('/samithis/' + slug, { method: 'PATCH', body: JSON.stringify({ action }) }); }
  catch (e) { alert(e.message); }
  loadSamithis(); loadAudit();
}

async function loadAudit() {
  const rows = await api('/audit?limit=30');
  document.querySelector('#audit tbody').innerHTML = rows.map(a => `
    <tr>
      <td class="muted">${esc((a.created_at || '').replace('T', ' ').slice(0, 19))}</td>
      <td>${esc(a.admin_email || '—')}</td>
      <td><code>${esc(a.action)}</code></td>
      <td>${esc(a.samithi_slug || '')}</td>
      <td><pre>${esc(a.payload_after ? JSON.stringify(a.payload_after) : '')}</pre></td>
    </tr>`).join('');
}

// Silent resume if a refresh token survives in this tab
if (refresh) {
  api('/me').then(d => { me = d; showPanel(); }).catch(() => sessionStorage.removeItem('pa.refresh'));
}
</script>
</body>
</html>
